<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - REACH OUT</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand-mark-small">RO</div>
                <h1>Reset password</h1>
                <p>Enter your email to reset your password</p>
            </div>

            <form id="forgotForm" class="auth-form">
                <label>
                    Email
                    <input type="email" id="email" name="email" placeholder="you@example.com" required />
                </label>
                <button type="submit" class="button primary full-width">Send Reset Link</button>
            </form>

            <div id="resetForm" class="auth-form" style="display:none;">
                <p style="text-align: center; color: var(--muted); margin-bottom: 20px;">Check your email for reset instructions</p>
                <label>
                    New Password
                    <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required />
                </label>
                <label>
                    Confirm Password
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="••••••••" required />
                </label>
                <button type="button" id="resetSubmit" class="button primary full-width">Update Password</button>
            </div>

            <p class="auth-footer">
                <a href="login.html">Back to login</a>
            </p>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
