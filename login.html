<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - REACH OUT</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand-mark-small">RO</div>
                <h1>Welcome back</h1>
                <p>Sign in to your REACH OUT account</p>
            </div>

            <form id="loginForm" class="auth-form">
                <label>
                    Email
                    <input type="email" id="email" name="email" placeholder="you@example.com" required />
                </label>
                <label>
                    Password
                    <input type="password" id="password" name="password" placeholder="••••••••" required />
                </label>
                <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                <button type="submit" class="button primary full-width">Sign In</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="signup.html">Create one</a>
            </p>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
